name = "cdn-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"

routes = [
  { pattern = "cdn.clawevo.ai/*", zone_name = "clawevo.ai" }
]

# R2 bucket binding
[[r2_buckets]]
binding = "CDN_BUCKET"
bucket_name = "clawevo-cdn"

# KV namespace for rate limiting
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "placeholder"
