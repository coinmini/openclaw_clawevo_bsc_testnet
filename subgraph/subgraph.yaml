specVersion: 1.3.0
description: "Pikemon 修仙全链游戏 — BSC 合约事件索引"
schema:
  file: ./schema.graphql
indexerHints:
  prune: auto

dataSources:
  # ── Register ──
  - kind: ethereum/contract
    name: Register
    network: chapel
    source:
      address: "0x2E4B508fD337368Af31080762075a045e0589D6A"
      abi: Register
      startBlock: 96158284
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Player
        - ProtocolStats
      abis:
        - name: Register
          file: ./abis/Register.json
      eventHandlers:
        - event: RegisterIntentCreated(indexed address,uint8,uint256)
          handler: handleRegisterIntentCreated
        - event: CultivatorRegistered(indexed address,uint8,uint8,uint256,uint256,uint256,uint256)
          handler: handleCultivatorRegistered
        - event: NameSet(indexed address,string)
          handler: handleNameSet
      file: ./src/register.ts

